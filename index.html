<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Otaworld243</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  :root {
    --surface-0: #f1f0ec;
    --surface-1: #e8e7e3;
    --surface-2: #ffffff;
    --surface-3: #ffffff;
    --text-primary: #1a1a18;
    --text-secondary: #5f5e5a;
    --text-muted: #888780;
    --border: rgba(0,0,0,0.1);
    --border-strong: rgba(0,0,0,0.18);
    --radius: 8px;

    --bg-accent: #e6f1fb;
    --text-accent: #185fa5;
    --fill-accent: #378add;
    --fill-accent-hover: #185fa5;
    --border-accent: #85b7eb;

    --bg-success: #eaf3de;
    --text-success: #3b6d11;
    --fill-success: #639922;
    --border-success: #97c459;
    --on-success: #ffffff;

    --bg-warning: #faeeda;
    --text-warning: #854f0b;
    --fill-warning: #ef9f27;
    --border-warning: #fac775;

    --bg-danger: #fcebeb;
    --text-danger: #a32d2d;
    --fill-danger: #e24b4a;
    --border-danger: #f09595;

    --on-accent: #ffffff;
    --on-brand: #ffffff;
  }

  [data-mode="dark"] {
    --surface-0: #1a1a18;
    --surface-1: #222220;
    --surface-2: #2c2c2a;
    --surface-3: #343432;
    --text-primary: #f0ede6;
    --text-secondary: #b4b2a9;
    --text-muted: #888780;
    --border: rgba(255,255,255,0.1);
    --border-strong: rgba(255,255,255,0.18);

    --bg-accent: #042c53;
    --text-accent: #85b7eb;
    --fill-accent: #378add;
    --fill-accent-hover: #85b7eb;
    --border-accent: #185fa5;

    --bg-success: #173404;
    --text-success: #97c459;
    --fill-success: #639922;
    --border-success: #3b6d11;

    --bg-warning: #412402;
    --text-warning: #fac775;
    --fill-warning: #ef9f27;
    --border-warning: #854f0b;

    --bg-danger: #501313;
    --text-danger: #f09595;
    --fill-danger: #e24b4a;
    --border-danger: #a32d2d;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; background: var(--surface-0); color: var(--text-primary); height: 100vh; overflow: hidden; font-size: 14px; }

  /* ─── LAYOUT ─── */
  .app { display: flex; flex-direction: column; height: 100vh; }
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; background: var(--surface-2); border-bottom: 0.5px solid var(--border); flex-shrink: 0; }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .logo { font-size: 16px; font-weight: 600; }
  .main { display: flex; flex: 1; overflow: hidden; }
  .sidebar { width: 54px; background: var(--surface-2); border-right: 0.5px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 8px 0; gap: 4px; flex-shrink: 0; }
  .content { flex: 1; overflow-y: auto; padding: 20px; background: var(--surface-0); }

  /* ─── NAV ─── */
  .nav-btn { width: 40px; height: 40px; border-radius: var(--radius); border: none; background: transparent; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; transition: background .15s, color .15s; position: relative; }
  .nav-btn:hover { background: var(--surface-1); color: var(--text-primary); }
  .nav-btn.active { background: var(--bg-accent); color: var(--text-accent); }
  .nav-btn.locked { opacity: 0.3; cursor: not-allowed; }
  .nav-btn .tooltip { display: none; position: absolute; left: 52px; background: var(--surface-3); border: 0.5px solid var(--border-strong); border-radius: var(--radius); padding: 4px 10px; font-size: 12px; white-space: nowrap; color: var(--text-primary); z-index: 50; pointer-events: none; }
  .nav-btn:hover .tooltip { display: block; }
  .nav-sep { width: 30px; border: none; border-top: 0.5px solid var(--border); margin: 4px 0; }

  /* ─── BADGES ─── */
  .badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 500; display: inline-block; }
  .badge-admin { background: var(--bg-accent); color: var(--text-accent); }
  .badge-seller { background: var(--bg-success); color: var(--text-success); }
  .badge-ok { background: var(--bg-success); color: var(--text-success); }
  .badge-low { background: var(--bg-warning); color: var(--text-warning); }
  .badge-out { background: var(--bg-danger); color: var(--text-danger); }

  /* ─── BUTTONS ─── */
  .btn { padding: 8px 16px; border-radius: var(--radius); border: 0.5px solid var(--border-strong); background: var(--surface-2); color: var(--text-primary); cursor: pointer; font-size: 13px; font-weight: 500; transition: background .12s; display: inline-flex; align-items: center; gap: 6px; }
  .btn:hover { background: var(--surface-1); }
  .btn-primary { background: var(--fill-accent); color: var(--on-accent); border-color: var(--fill-accent); }
  .btn-primary:hover { background: var(--fill-accent-hover); border-color: var(--fill-accent-hover); }
  .btn-success { background: var(--fill-success); color: var(--on-success); border-color: var(--fill-success); }
  .btn-success:hover { filter: brightness(0.9); }
  .btn-danger { background: transparent; color: var(--text-danger); border-color: var(--border-danger); }
  .btn-danger:hover { background: var(--bg-danger); }
  .btn-sm { font-size: 12px; padding: 5px 10px; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ─── FORMS ─── */
  input, select, textarea { padding: 8px 10px; border-radius: var(--radius); border: 0.5px solid var(--border-strong); background: var(--surface-1); color: var(--text-primary); font-size: 13px; font-family: inherit; width: 100%; transition: border-color .12s; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--fill-accent); box-shadow: 0 0 0 3px rgba(55,138,221,0.15); }
  label { font-size: 12px; color: var(--text-secondary); display: block; margin-bottom: 4px; }
  .form-field { display: flex; flex-direction: column; gap: 4px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

  /* ─── CARDS ─── */
  .card { background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 12px; padding: 16px; }
  .section-title { font-size: 15px; font-weight: 600; margin-bottom: 14px; color: var(--text-primary); }

  /* ─── TABLES ─── */
  .data-table { width: 100%; border-collapse: collapse; }
  .data-table th { font-size: 11px; color: var(--text-secondary); text-align: left; padding: 8px 12px; border-bottom: 0.5px solid var(--border); text-transform: uppercase; letter-spacing: .5px; font-weight: 500; }
  .data-table td { font-size: 13px; padding: 10px 12px; border-bottom: 0.5px solid var(--border); }
  .data-table tbody tr:last-child td { border-bottom: none; }
  .data-table tbody tr:hover td { background: var(--surface-1); }

  /* ─── LOGIN ─── */
  #login-screen { position: fixed; inset: 0; background: var(--surface-0); display: flex; align-items: center; justify-content: center; z-index: 200; }
  .login-card { background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 16px; padding: 36px 32px; width: 380px; text-align: center; }
  .login-logo { font-size: 44px; margin-bottom: 12px; }
  .login-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .login-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 28px; }
  .user-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .user-choice { border: 0.5px solid var(--border); border-radius: 12px; padding: 20px 12px; cursor: pointer; text-align: center; background: var(--surface-1); transition: border-color .15s, background .15s; }
  .user-choice:hover { border-color: var(--fill-accent); background: var(--bg-accent); }
  .user-choice .uc-icon { font-size: 36px; margin-bottom: 8px; }
  .user-choice .uc-name { font-size: 14px; font-weight: 600; }
  .user-choice .uc-role { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

  /* ─── POS ─── */
  .pos-layout { display: grid; grid-template-columns: 1fr 340px; gap: 16px; }
  .qr-frame { border: 2px dashed var(--border-strong); border-radius: 12px; height: 170px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; cursor: pointer; transition: all .15s; }
  .qr-frame:hover { border-color: var(--fill-accent); background: var(--bg-accent); }
  .qr-frame.scanning { border-color: var(--fill-accent); background: var(--bg-accent); animation: pulse .6s ease-in-out; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }
  .qr-icon { font-size: 44px; opacity: 0.4; }
  .product-preview { display: flex; gap: 14px; align-items: flex-start; background: var(--surface-1); border-radius: var(--radius); padding: 14px; margin-top: 4px; border: 0.5px solid var(--border); }
  .product-emoji-big { font-size: 44px; }
  .product-price { font-size: 24px; font-weight: 700; color: var(--text-accent); margin: 4px 0; }
  .cart-panel { background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 12px; padding: 16px; display: flex; flex-direction: column; gap: 10px; max-height: calc(100vh - 120px); }
  .cart-items { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
  .cart-item { display: flex; align-items: center; gap: 8px; background: var(--surface-1); border-radius: var(--radius); padding: 8px 10px; }
  .qty-ctrl { display: flex; align-items: center; gap: 6px; }
  .qty-btn { width: 24px; height: 24px; border-radius: 4px; border: 0.5px solid var(--border-strong); background: var(--surface-2); cursor: pointer; font-size: 16px; line-height: 1; display: flex; align-items: center; justify-content: center; color: var(--text-primary); }
  .qty-btn:hover { background: var(--surface-0); }
  .cart-total { display: flex; justify-content: space-between; align-items: baseline; padding: 8px 0; border-top: 0.5px solid var(--border); }
  .cart-total-amount { font-size: 24px; font-weight: 700; color: var(--text-primary); }
  .manual-search { display: flex; gap: 8px; margin-top: 4px; }
  .manual-search input { flex: 1; }

  /* ─── STOCK ─── */
  .cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .cat-card { background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 12px; padding: 16px; cursor: pointer; transition: border-color .15s; }
  .cat-card:hover { border-color: var(--border-strong); }
  .cat-emoji { font-size: 32px; margin-bottom: 8px; }
  .cat-name-text { font-size: 13px; font-weight: 600; }
  .cat-meta { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
  .stock-bar-bg { height: 4px; background: var(--surface-0); border-radius: 2px; margin-top: 10px; overflow: hidden; }
  .stock-bar-fill { height: 100%; border-radius: 2px; transition: width .4s; }

  /* ─── MODAL ─── */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 100; }
  .modal-bg.open { display: flex; }
  .modal-box { background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 16px; padding: 24px; width: 420px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
  .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 16px; }

  /* ─── TOAST ─── */
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 12px; padding: 12px 16px; font-size: 13px; display: flex; align-items: center; gap: 10px; z-index: 999; box-shadow: 0 4px 24px rgba(0,0,0,0.15); max-width: 320px; transform: translateY(80px); opacity: 0; transition: transform .25s, opacity .25s; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast-icon { font-size: 18px; }

  /* ─── USERS ─── */
  .users-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .user-item { background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 12px; padding: 16px; display: flex; align-items: center; gap: 12px; }
  .avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; flex-shrink: 0; }
  .av-admin { background: var(--bg-accent); color: var(--text-accent); }
  .av-seller { background: var(--bg-success); color: var(--text-success); }
  .add-user-card { border: 0.5px dashed var(--border-strong) !important; cursor: pointer; justify-content: center; text-align: center; flex-direction: column; gap: 6px; }
  .add-user-card:hover { border-color: var(--fill-accent) !important; background: var(--bg-accent); }

  /* ─── MISC ─── */
  .empty-state { text-align: center; padding: 40px; color: var(--text-muted); }
  .empty-state .empty-icon { font-size: 40px; margin-bottom: 10px; opacity: 0.4; }
  .row { display: flex; align-items: center; gap: 8px; }
  .flex1 { flex: 1; }
  hr { border: none; border-top: 0.5px solid var(--border); margin: 8px 0; }
  .theme-toggle { cursor: pointer; font-size: 18px; background: none; border: none; color: var(--text-secondary); padding: 4px 8px; border-radius: var(--radius); }
  .theme-toggle:hover { background: var(--surface-1); }
  .sale-history { display: flex; flex-direction: column; gap: 8px; }
  .sale-row { background: var(--surface-1); border-radius: var(--radius); padding: 10px 12px; display: flex; justify-content: space-between; align-items: center; }

  /* ─── RESPONSIVE (mobile / tablette) ─── */
  @media (max-width: 860px) {
    body { height: auto; min-height: 100vh; overflow: visible; }
    .app { height: auto; min-height: 100vh; }
    .main { flex-direction: column; overflow: visible; }
    .sidebar { width: 100%; flex-direction: row; justify-content: flex-start; overflow-x: auto; padding: 6px 8px; gap: 6px; -webkit-overflow-scrolling: touch; }
    .nav-sep { display: none; }
    .nav-btn { flex-shrink: 0; }
    .nav-btn .tooltip { display: none !important; }
    .content { padding: 12px; overflow-y: visible; }
    .pos-layout { grid-template-columns: 1fr; }
    .cart-panel { max-height: none; }
    .form-grid, .form-grid-3 { grid-template-columns: 1fr; }
    .topbar { flex-wrap: wrap; gap: 8px; padding: 10px 12px; }
    .topbar-left { flex-wrap: wrap; }
    .modal-box { width: 92vw; padding: 18px; }
    .card { overflow-x: auto; }
    .login-card { width: 90vw; padding: 28px 18px; }
    .users-grid, .cat-grid { grid-template-columns: 1fr; }
    .manual-search { flex-direction: column; align-items: stretch; }
  }
  @media (max-width: 480px) {
    body { font-size: 13px; }
    .login-logo { font-size: 36px; }
    .login-title { font-size: 19px; }
    .cart-total-amount { font-size: 20px; }
  }
</style>
</head>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">🏪</div>
    <div class="login-title">otaworld243</div>
    <div class="login-sub" id="login-sub">Connexion à la base de données…</div>

<!-- APP -->
<div class="app" id="app-shell" style="display:none">

      <span style="font-size:24px">🏪</span>
      <span class="logo">otaworld243</span>

  <div class="main">

      <button class="nav-btn" id="nav-users" onclick="navigate('users')">👥<span class="tooltip">Utilisateurs</span></button>
      <button class="nav-btn" id="nav-settings" onclick="navigate('settings')">⚙️<span class="tooltip">Paramètres (taux de change)</span></button>
    </div>
    <div class="content" id="page-content"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg" onclick="closeModalBg(event)">
  <div class="modal-box" id="modal-box"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <span class="toast-icon" id="toast-icon">✅</span>
  <span id="toast-msg"></span>
</div>

    useFirebase = true;
  }
} catch (e) {
  console.warn('Firebase non configuré correctement, repli sur le stockage local.', e);
  useFirebase = false;
}

// ══════════════════════════════════════════════
//  PERSISTANCE (localStorage — secours hors-ligne / mode local)
// ══════════════════════════════════════════════
function load(key, def) {
  try { const v = localStorage.getItem('boutique_'+key); return v ? JSON.parse(v) : def; }
  catch(e) { return def; }
}
function save(key, val) {
  try { localStorage.setItem('boutique_'+key, JSON.stringify(val)); } catch(e) {}
}

let products = DEFAULT_PRODUCTS;
let users = DEFAULT_USERS;
let salesHistory = [];
let exchangeRate = 2800; // Taux par défaut : 1 $ = 2800 Fc (modifiable par l'admin)

function saveProducts() {
  if (useFirebase) docRef.set({ products }, { merge: true }).catch(e => console.warn('Erreur Firebase (produits):', e));
  else save('products', products);
}
function saveUsers() {
  if (useFirebase) docRef.set({ users }, { merge: true }).catch(e => console.warn('Erreur Firebase (utilisateurs):', e));
  else save('users', users);
}
function saveSales() {
  if (useFirebase) docRef.set({ sales: salesHistory }, { merge: true }).catch(e => console.warn('Erreur Firebase (ventes):', e));
  else save('sales', salesHistory);
}
function saveSettings() {
  if (useFirebase) docRef.set({ exchangeRate }, { merge: true }).catch(e => console.warn('Erreur Firebase (paramètres):', e));
  else save('rate', exchangeRate);
}

function loadLocalFallback() {
  products = load('products', DEFAULT_PRODUCTS);
  users = load('users', DEFAULT_USERS);
  salesHistory = load('sales', []);
  exchangeRate = load('rate', 2800);
}

// ══════════════════════════════════════════════
//  DEVISES — Franc congolais (Fc) / Dollar US ($)
// ══════════════════════════════════════════════
function fmtFC(n) {
  n = Math.round(n || 0);
  return n.toLocaleString('fr-FR') + ' Fc';
}
function fmtUSD(n) {
  return '$' + (n || 0).toFixed(2);
}
function fcToUsd(fc) { return exchangeRate > 0 ? fc / exchangeRate : 0; }
function usdToFc(usd) { return usd * exchangeRate; }

// Re-affiche la vue courante quand les données changent (ex: mise à jour
// faite depuis une autre machine connectée à la même base Firebase).
function refreshAfterSync() {
  if (currentUser) {
    if (['pos','stock','add','history','users','settings'].includes(currentView)) navigate(currentView);
  } else {
    renderLoginGrid();
  }
}

async function initData() {
  const subEl = document.getElementById('login-sub');
  if (useFirebase) {
    try {
      const snap = await docRef.get();
      if (snap.exists) {
        const d = snap.data();
        products = d.products || DEFAULT_PRODUCTS;
        users = d.users || DEFAULT_USERS;
        salesHistory = d.sales || [];
        exchangeRate = d.exchangeRate || 2800;
      } else {
        await docRef.set({ products: DEFAULT_PRODUCTS, users: DEFAULT_USERS, sales: [], exchangeRate: 2800 });
      }
      // Synchronisation en temps réel entre tous les appareils connectés
      docRef.onSnapshot(snap => {
        if (!snap.exists) return;
        const d = snap.data();
        products = d.products || products;
        users = d.users || users;
        salesHistory = d.sales || salesHistory;
        exchangeRate = d.exchangeRate || exchangeRate;
        refreshAfterSync();
      });
      if (subEl) subEl.textContent = 'Connectez-vous avec votre identifiant et mot de passe';
    } catch (e) {
      console.warn('Erreur de connexion à Firebase, repli sur le stockage local.', e);
      useFirebase = false;
      loadLocalFallback();
      if (subEl) subEl.textContent = 'Connectez-vous (mode local — voir console)';
    }
  } else {
    loadLocalFallback();
    if (subEl) subEl.textContent = 'Connectez-vous avec votre identifiant et mot de passe';
  }
  isDataReady = true;
}

function renderLoginGrid() {
  // Plus de grille de profils cliquables : connexion par identifiant + mot de passe.
  const u = document.getElementById('login-username');
  const p = document.getElementById('login-password');
  const err = document.getElementById('login-error');

  if (p) p.value = '';
  if (err) err.style.display = 'none';
}

function doLogin() {
  if (!isDataReady) { toast('Chargement des données en cours, patientez…','⏳'); return; }
  const username = (document.getElementById('login-username').value || '').trim().toLowerCase();
  const password = document.getElementById('login-password').value || '';
  const errEl = document.getElementById('login-error');
  const u = users.find(x => (x.username || '').toLowerCase() === username);
  if (!u || u.password !== password) {
    errEl.textContent = 'Identifiant ou mot de passe incorrect.';
    errEl.style.display = 'block';
    return;
  }
  currentUser = u;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-shell').style.display = 'flex';
  document.getElementById('header-username').textContent = u.name;
  document.getElementById('header-role-badge').textContent = u.role === 'admin' ? 'Administrateur' : 'Vendeur';
  document.getElementById('header-role-badge').className = 'badge ' + (u.role === 'admin' ? 'badge-admin' : 'badge-seller');
  setupNavAccess();
  cart = [];
  scannedProduct = null;
  navigate('pos');
}

function doLogout() {
  currentUser = null; cart = []; scannedProduct = null;
  document.getElementById('app-shell').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  renderLoginGrid();
}

function setupNavAccess() {
  const isAdmin = currentUser.role === 'admin';
  ['nav-stock','nav-add','nav-history','nav-users','nav-settings'].forEach(id => {
    const btn = document.getElementById(id);
    if (isAdmin) { btn.classList.remove('locked'); btn.onclick = () => navigate(id.replace('nav-','')); }
    else { btn.classList.add('locked'); btn.onclick = () => toast('Accès réservé à l\'administrateur','⚠️'); }
  });
}

// ══════════════════════════════════════════════
function navigate(view) {
  if (currentUser.role !== 'admin' && view !== 'pos') { toast('Accès réservé à l\'administrateur','⚠️'); return; }
  currentView = view;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const navEl = document.getElementById('nav-'+view);
  if (navEl) navEl.classList.add('active');
  const pc = document.getElementById('page-content');
  if (view === 'pos') renderPOS(pc);
  else if (view === 'stock') renderStock(pc);
  else if (view === 'add') renderAddProduct(pc);
  else if (view === 'history') renderHistory(pc);
  else if (view === 'users') renderUsers(pc);
  else if (view === 'settings') renderSettings(pc);
}

let html5QrCode = null;

function startCameraScan() {
  if (typeof Html5Qrcode === 'undefined') {
    toast('Bibliothèque de scan indisponible (vérifiez votre connexion internet)', '⚠️');
    return;
  }
  openModal(`
    <div class="modal-title">📷 Scanner un code-barre</div>
    <div id="qr-reader" style="width:100%;border-radius:8px;overflow:hidden"></div>
    <div style="font-size:12px;color:var(--text-secondary);margin-top:10px">Présentez le code-barre devant la caméra. Autorisez l'accès à la caméra si le navigateur le demande.</div>
    <div class="modal-actions">
      <button class="btn" style="flex:1;justify-content:center" onclick="stopCameraScan()">Fermer</button>
    </div>
  `);
  html5QrCode = new Html5Qrcode("qr-reader");
  const formatsToSupport = (typeof Html5QrcodeSupportedFormats !== 'undefined') ? [
    Html5QrcodeSupportedFormats.CODE_39,
    Html5QrcodeSupportedFormats.CODE_93,
    Html5QrcodeSupportedFormats.CODE_128,
    Html5QrcodeSupportedFormats.EAN_13,
    Html5QrcodeSupportedFormats.EAN_8,
    Html5QrcodeSupportedFormats.UPC_A,
    Html5QrcodeSupportedFormats.UPC_E,
    Html5QrcodeSupportedFormats.ITF,
    Html5QrcodeSupportedFormats.QR_CODE
  ] : undefined;
  const config = { fps: 15, qrbox: { width: 250, height: 150 }, formatsToSupport };

  // Force l'autofocus continu sur le flux vidéo après démarrage
  const applyFocusFix = () => {
    setTimeout(() => {
      try {
        const video = document.querySelector('#qr-reader video');
        if (!video) return;
        const stream = video.srcObject;
        if (!stream) return;
        const track = stream.getVideoTracks()[0];
        if (!track) return;
        const caps = track.getCapabilities ? track.getCapabilities() : {};
        const constraints = {};
        if (caps.focusMode && caps.focusMode.includes('continuous')) {
          constraints.focusMode = 'continuous';
        }
        if (caps.zoom) {
          constraints.zoom = Math.min(2.0, caps.zoom.min + (caps.zoom.max - caps.zoom.min) * 0.15);
        }
        if (Object.keys(constraints).length > 0) {
          track.applyConstraints({ advanced: [constraints] }).catch(() => {});
        }
      } catch(e) {}
    }, 800);
  };

  const fallbackStart = () => {
    html5QrCode.start(
      { facingMode: { exact: "environment" } },
      config,
      (decodedText) => { onBarcodeDetected(decodedText); },
      () => {}
    ).then(applyFocusFix).catch(() => {
      html5QrCode.start(
        { facingMode: "environment" },
        config,
        (decodedText) => { onBarcodeDetected(decodedText); },
        () => {}
      ).then(applyFocusFix).catch(() => {
        toast('Caméra inaccessible : vérifiez les autorisations ou utilisez HTTPS', '⚠️');
        closeModal();
      });
    });
  };

  // Sélection intelligente : éviter le grand-angle, préférer la caméra principale
  Html5Qrcode.getCameras().then(cameras => {
    if (!cameras || cameras.length === 0) { fallbackStart(); return; }

    let chosen = null;
    // 1. Chercher une caméra arrière explicitement non-wide
    for (const c of cameras) {
      const label = (c.label || '').toLowerCase();
      if ((label.includes('back') || label.includes('arrière') || label.includes('rear'))
          && !label.includes('ultra') && !label.includes('wide') && !label.includes('0.6')) {
        chosen = c; break;
      }
    }
    // 2. Si rien trouvé, prendre la dernière caméra (souvent la principale sur multi-cam)
    if (!chosen) chosen = cameras[cameras.length - 1];

    html5QrCode.start(
      chosen.id,
      config,
      (decodedText) => { onBarcodeDetected(decodedText); },
      () => {}
    ).then(applyFocusFix).catch(() => fallbackStart());

  }).catch(() => fallbackStart());
}

function onBarcodeDetected(code) {
  if (!html5QrCode) return;
  const finish = () => {
    html5QrCode = null;
    closeModal();
    const input = document.getElementById('barcode-input');
    if (input) input.value = code;
    lookupBarcode(code);
  };
  html5QrCode.stop().then(() => { html5QrCode.clear(); finish(); }).catch(finish);
}

function stopCameraScan() {
  if (html5QrCode) {
    html5QrCode.stop().then(() => { html5QrCode.clear(); html5QrCode = null; closeModal(); })
      .catch(() => { html5QrCode = null; closeModal(); });
  } else {
    closeModal();
  }
}

function lookupBarcode(code) {
  const c = (code || '').trim().toUpperCase().replace(/^\*+|\*+$/g, '');
  const p = products.find(x => x.barcode.toUpperCase() === c || x.id.toUpperCase() === c);
  if (p) { scannedProduct = p; navigate('pos'); toast('Article trouvé : ' + p.name, '✅'); }
  else { toast('Article introuvable : ' + code, '⚠️'); }
}

function searchBarcode() {
  const code = (document.getElementById('barcode-input').value || '').trim();
  if (!code) return;
  lookupBarcode(code);
}

function addToCart() {
  if (!scannedProduct || scannedProduct.stock === 0) return;
  const existing = cart.find(i => i.id === scannedProduct.id);
  const inCart = existing ? existing.qty : 0;
  if (inCart >= scannedProduct.stock) { toast('Stock insuffisant pour en ajouter davantage','⚠️'); return; }
  if (existing) existing.qty++;
  else cart.push({ ...scannedProduct, qty: 1 });
  scannedProduct = null;
  navigate('pos');
}

function changeQty(idx, delta) {
  const item = cart[idx];
  const prod = products.find(p => p.id === item.id);
  item.qty += delta;
  if (item.qty <= 0) cart.splice(idx, 1);
  else if (prod && item.qty > prod.stock) { item.qty = prod.stock; toast('Quantité limitée au stock disponible','⚠️'); }
  navigate('pos');
}

function clearCart() { cart = []; scannedProduct = null; navigate('pos'); }

function confirmSale() {
  const total = cart.reduce((s,i) => s + i.price * i.qty, 0);
  const items = cart.map(i => ({...i}));
  cart.forEach(item => {
    const p = products.find(x => x.id === item.id);
    if (p) p.stock = Math.max(0, p.stock - item.qty);
  });
  saveProducts();
  const sale = {
    id: 'V'+Date.now(), date: new Date().toLocaleString('fr-FR'), seller: currentUser.name, items, total,
    received: lastReceived, change: lastChange,
    payCurrency: lastPayCurrency, receivedForeign: lastReceivedForeign, rateUsed: lastRateUsed
  };
  salesHistory.unshift(sale);
  if (salesHistory.length > 500) salesHistory = salesHistory.slice(0, 500);
  saveSales();
  lastSale = sale;
  cart = []; scannedProduct = null;
  lastReceived = null; lastChange = null; lastPayCurrency = null; lastReceivedForeign = null; lastRateUsed = null;
  closeModal();
  toast(`Vente validée — ${fmtFC(total)}`, '✅');
  navigate('pos');
  openReceiptChoice();
}

        <tr><td>Équivalent reçu</td><td class="right">${fmtFC(s.received)}</td></tr>
        <tr><td>Rendu monnaie</td><td class="right">${fmtFC(s.change)}</td></tr>` :
        (s.received !== null && s.received !== undefined ? `<tr><td>Montant reçu</td><td class="right">${fmtFC(s.received)}</td></tr><tr><td>Rendu monnaie</td><td class="right">${fmtFC(s.change)}</td></tr>` : '')}

}

function openPaymentCalc() {
  const total = cart.reduce((s,i) => s + i.price * i.qty, 0);
  openModal(`
    <div class="modal-title">🧮 Rendu monnaie</div>
    <div style="font-size:20px;font-weight:700;color:var(--text-accent);margin-bottom:2px">Total : ${fmtFC(total)}</div>
    <div style="font-size:12px;color:var(--text-muted);margin-bottom:16px">≈ ${fmtUSD(fcToUsd(total))} au taux actuel (1 $ = ${fmtFC(exchangeRate)})</div>
    <div class="form-grid" style="margin-bottom:6px">
      <div class="form-field">
        <label>Devise reçue</label>
        <select id="pay-currency" onchange="switchPayCurrency(${total})">
          <option value="FC">Franc congolais (Fc)</option>
          <option value="USD">Dollar américain ($)</option>
        </select>
      </div>
      <div class="form-field">
        <label id="received-label">Montant reçu (Fc)</label>
        <input type="number" id="received-amount" value="${Math.ceil(total/50)*50}" step="50" min="0" oninput="updateChange(${total})" style="font-size:18px">
      </div>
    </div>
    <div id="usd-hint" style="font-size:12px;color:var(--text-muted);margin-bottom:12px;min-height:14px"></div>
    <div style="background:var(--bg-success);border-radius:var(--radius);padding:14px;text-align:center">
      <div style="font-size:12px;color:var(--text-success)">Rendu monnaie (en Fc)</div>
      <div id="change-amount" style="font-size:28px;font-weight:700;color:var(--text-success)">0 Fc</div>
    </div>
    <div class="modal-actions" style="margin-top:14px">
      <button class="btn btn-success" style="flex:1;justify-content:center" onclick="captureChangeAndConfirm(${total})">✅ Valider la vente</button>
      <button class="btn" onclick="closeModal()">Fermer</button>
    </div>
  `);
  updateChange(total);
}

function switchPayCurrency(total) {
  const currency = document.getElementById('pay-currency').value;
  const input = document.getElementById('received-amount');
  if (currency === 'USD') {
    input.step = '0.5';
    input.value = (Math.ceil(fcToUsd(total)*2)/2).toFixed(2);
  } else {
    input.step = '50';
    input.value = Math.ceil(total/50)*50;
  }
  updateChange(total);
}

function updateChange(total) {
  const currency = document.getElementById('pay-currency').value;
  const recInput = parseFloat(document.getElementById('received-amount').value) || 0;
  const recFC = currency === 'USD' ? usdToFc(recInput) : recInput;
  const change = recFC - total;
  const el = document.getElementById('change-amount');
  el.textContent = fmtFC(change);
  el.style.color = change < 0 ? 'var(--text-danger)' : 'var(--text-success)';
  el.closest('div').style.background = change < 0 ? 'var(--bg-danger)' : 'var(--bg-success)';
  document.getElementById('received-label').textContent = currency === 'USD' ? 'Montant reçu ($)' : 'Montant reçu (Fc)';
  const hint = document.getElementById('usd-hint');
  hint.textContent = currency === 'USD' ? `≈ ${fmtFC(recFC)} au taux actuel (1 $ = ${fmtFC(exchangeRate)})` : '';
}

function captureChangeAndConfirm(total) {
  const currency = document.getElementById('pay-currency').value;
  const recInput = parseFloat(document.getElementById('received-amount').value);
  if (isNaN(recInput)) {
    lastReceived = null; lastChange = null; lastPayCurrency = null; lastReceivedForeign = null; lastRateUsed = null;
  } else if (currency === 'USD') {
    lastPayCurrency = 'USD';
    lastReceivedForeign = recInput;
    lastReceived = usdToFc(recInput);
    lastChange = lastReceived - total;
    lastRateUsed = exchangeRate;
  } else {
    lastPayCurrency = 'FC';
    lastReceivedForeign = null;
    lastReceived = recInput;
    lastChange = lastReceived - total;
    lastRateUsed = exchangeRate;
  }
  closeModal();
  openConfirmSale();
}

      const barClass = pct === 0 ? 'background:var(--fill-danger)' : pct < 0.2 ? 'background:var(--fill-warning)' : 'background:var(--fill-success)';

      <tbody id="stock-tbody">

}

function buildStockRows(ps) {
  return ps.map(p => {
    const pct = p.maxStock > 0 ? p.stock/p.maxStock : 0;
    const cls = p.stock===0?'badge-out':pct<0.2?'badge-low':'badge-ok';
    const label = p.stock===0?'Rupture':pct<0.2?'Faible':'OK';
    return `<tr data-cat="${p.category}" data-name="${p.name.toLowerCase()}">
      <td><span style="margin-right:6px">${p.emoji}</span>${p.name}</td>
      <td style="color:var(--text-secondary)">${p.category}</td>
      <td style="font-family:monospace;font-size:12px;color:var(--text-muted)">${p.barcode}</td>
      <td style="text-align:right;color:var(--text-accent);font-weight:600">${fmtFC(p.price)}</td>
      <td style="text-align:center;font-weight:600">${p.stock} <span style="color:var(--text-muted);font-weight:400">/ ${p.maxStock}</span></td>
      <td style="text-align:center"><span class="badge ${cls}">${label}</span></td>
      <td style="text-align:right">
        <button class="btn btn-sm" onclick="openEditProduct('${p.id}')">✏️ Modifier</button>
      </td>
    </tr>`;
  }).join('');
}

function filterStockTable() {
  const q = (document.getElementById('stock-search').value||'').toLowerCase();
  const cat = document.getElementById('stock-cat-filter').value;
  const rows = document.querySelectorAll('#stock-tbody tr');
  rows.forEach(row => {
    const matchName = row.dataset.name.includes(q);
    const matchCat = !cat || row.dataset.cat === cat;
    row.style.display = matchName && matchCat ? '' : 'none';
  });
}

function openEditProduct(id) {

function saveEdit(id) {
  const p = products.find(x => x.id === id);

  closeModal();
  toast('Article mis à jour', '✅');

function confirmDeleteProduct(id) {
  const p = products.find(x => x.id === id);
  openModal(`

      <button class="btn" onclick="openEditProduct('${id}')">Annuler</button>

}

function deleteProduct(id) {
  products = products.filter(x => x.id !== id);

}

function addProduct() {
  const name = document.getElementById('f-name').value.trim();
  const price = parseFloat(document.getElementById('f-price').value);
  const stock = parseInt(document.getElementById('f-stock').value) || 0;
  const max = parseInt(document.getElementById('f-max').value) || 50;
  let cat = document.getElementById('f-cat').value;
  const barcode = document.getElementById('f-barcode').value.trim().toUpperCase();
  const emoji = document.getElementById('f-emoji').value.trim() || '🏷️';

  if (!name) { toast('Entrez un nom d\'article','⚠️'); return; }
  if (isNaN(price) || price < 0) { toast('Prix invalide','⚠️'); return; }
  if (!barcode) { toast('Entrez un code barres','⚠️'); return; }
  if (products.find(p => p.barcode === barcode)) { toast('Ce code barres est déjà utilisé','⚠️'); return; }
  if (cat === '__new') { cat = prompt('Nom de la nouvelle catégorie :'); if (!cat) return; }

  const id = 'P' + String(Date.now()).slice(-6);
  products.push({ id, name, category: cat, emoji, price, stock, maxStock: max, barcode });
  saveProducts();
  toast(`"${name}" ajouté au stock`, '✅');
  navigate('add');
}

function clearAddForm() {
  ['f-name','f-price','f-barcode','f-emoji'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-stock').value = '0';
  document.getElementById('f-max').value = '50';
}

          ['Voir l\'historique des ventes','✅','❌'],
          ['Gérer les utilisateurs','✅','❌'],
          ['Modifier le taux de change ($ → Fc)','✅','❌'],
        ].map(([f,a,v])=>`<tr><td>${f}</td><td style="text-align:center">${a}</td><td style="text-align:center">${v}</td></tr>`).join('')}
      </tbody>
    </table>
  </div>`;
}

function openAddUser() {
  openModal(`
    <div class="modal-title">👤 Ajouter un utilisateur</div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <div class="form-field"><label>Nom complet *</label><input id="u-name" placeholder="Prénom Nom"></div>
      <div class="form-field"><label>Email</label><input id="u-email" type="email" placeholder="email@boutique.fr"></div>
      <div class="form-field"><label>Identifiant de connexion *</label><input id="u-username" placeholder="ex: jdupont"></div>
      <div class="form-field"><label>Mot de passe *</label><input id="u-password" type="password" placeholder="••••••••"></div>
      <div class="form-field"><label>Rôle</label>
        <select id="u-role"><option value="seller">Vendeur</option><option value="admin">Administrateur</option></select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" style="flex:1;justify-content:center" onclick="addUser()">✅ Créer</button>
      <button class="btn" onclick="closeModal()">Annuler</button>
    </div>
  `);
}

function addUser() {
  const name = document.getElementById('u-name').value.trim();
  const email = document.getElementById('u-email').value.trim();
  const username = document.getElementById('u-username').value.trim().toLowerCase();
  const password = document.getElementById('u-password').value;
  const role = document.getElementById('u-role').value;
  if (!name) { toast('Entrez un nom','⚠️'); return; }
  if (!username) { toast('Entrez un identifiant de connexion','⚠️'); return; }
  if (users.some(x => (x.username||'').toLowerCase() === username)) { toast('Cet identifiant existe déjà','⚠️'); return; }
  if (!password) { toast('Entrez un mot de passe','⚠️'); return; }
  users.push({ id:'U'+Date.now(), name, role, email, username, password });
  saveUsers();
  closeModal();
  toast(`${name} ajouté(e)`, '✅');
  navigate('users');
}

function openEditUser(id) {
  const u = users.find(x => x.id === id);
  if (!u) return;
  openModal(`
    <div class="modal-title">✏️ Modifier l'utilisateur</div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <div class="form-field"><label>Nom complet</label><input id="eu-name" value="${u.name}"></div>
      <div class="form-field"><label>Email</label><input id="eu-email" type="email" value="${u.email}"></div>
      <div class="form-field"><label>Identifiant de connexion</label><input id="eu-username" value="${u.username || ''}"></div>
      <div class="form-field"><label>Nouveau mot de passe</label><input id="eu-password" type="password" placeholder="Laisser vide pour ne pas changer"></div>
      <div class="form-field"><label>Rôle</label>
        <select id="eu-role" ${u.id===currentUser.id?'disabled':''}>
          <option value="seller" ${u.role==='seller'?'selected':''}>Vendeur</option>
          <option value="admin" ${u.role==='admin'?'selected':''}>Administrateur</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" style="flex:1;justify-content:center" onclick="saveUser('${id}')">💾 Enregistrer</button>
      <button class="btn" onclick="closeModal()">Annuler</button>
    </div>
  `);
}

function saveUser(id) {
  const u = users.find(x => x.id === id);
  const newUsername = document.getElementById('eu-username').value.trim().toLowerCase();
  if (newUsername && users.some(x => x.id !== id && (x.username||'').toLowerCase() === newUsername)) {
    toast('Cet identifiant est déjà utilisé','⚠️'); return;
  }
  u.name = document.getElementById('eu-name').value.trim() || u.name;
  u.email = document.getElementById('eu-email').value.trim();
  if (newUsername) u.username = newUsername;
  const newPassword = document.getElementById('eu-password').value;
  if (newPassword) u.password = newPassword;
  if (u.id !== currentUser.id) u.role = document.getElementById('eu-role').value;
  saveUsers();
  closeModal();
  toast('Utilisateur mis à jour','✅');
  navigate('users');
}

function confirmDeleteUser(id) {
  const u = users.find(x => x.id === id);
  openModal(`
    <div class="modal-title">🗑 Supprimer l'utilisateur</div>
    <div style="margin-bottom:16px;color:var(--text-secondary)">Supprimer <strong>${u.name}</strong> ? Cette action est irréversible.</div>
    <div class="modal-actions">
      <button class="btn btn-danger" style="flex:1;justify-content:center" onclick="deleteUser('${id}')">Supprimer</button>
      <button class="btn" onclick="closeModal()">Annuler</button>
    </div>
  `);
}

function deleteUser(id) {
  users = users.filter(x => x.id !== id);
  saveUsers();
  closeModal();
  toast('Utilisateur supprimé','✅');
  navigate('users');
}

// ══════════════════════════════════════════════
//  MODAL & TOAST
// ══════════════════════════════════════════════
function openModal(html) {
  document.getElementById('modal-box').innerHTML = html;
  document.getElementById('modal-bg').classList.add('open');
}
function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }
function closeModalBg(e) { if (e.target === document.getElementById('modal-bg')) closeModal(); }

let toastTimer;
function toast(msg, icon='✅') {
  const el = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  document.getElementById('toast-icon').textContent = icon;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3200);
}

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
initData();
</script>
</body>
</html>
